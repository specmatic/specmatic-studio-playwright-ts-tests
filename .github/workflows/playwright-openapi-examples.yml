name: Studio - OpenAPI Examples Tests
on:
  push:
    branches: [main, master, invalid-spec-tests]
  pull_request:
    branches: [main, master]
jobs:
  generate-valid-examples:
    uses: ./.github/workflows/playwright-test-group.yml
    with:
      test_path: specs/openapi/generate-valid-examples
      artifact_name: generate-valid-examples
      group_name: Examples
    secrets:
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
      SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}
