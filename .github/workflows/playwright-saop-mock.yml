name: Studio - SOAP Mock Tests
on:
  push:
    branches: [main, master, invalid-spec-tests]
  pull_request:
    branches: [main, master]

jobs:
  run-soap-mock-server:
    uses: ./.github/workflows/playwright-test-group.yml
    with:
      test_path: specs/soap/run-mock-server
      artifact_name: run-soap-mock-server
      group_name: SOAP Mock
    secrets:
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
      SPECMATIC_LICENSE_KEY: ${{ secrets.SPECMATIC_LICENSE_KEY }}
